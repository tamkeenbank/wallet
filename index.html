<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamkeen Wallet | محفظة تمكين</title>
    <script>
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isAndroid = /android/i.test(ua);
            var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            var androidUrl = "https://play.google.com/store/apps/details?id=com.aamal_tech.tamkeen_wallet";
            var iosUrl = "https://apps.apple.com/app/id6747835674";
            var fallbackUrl = "http://www.tamkeenbank-ye.com/";

            if (isAndroid) {
                window.location.replace(androidUrl);
            } else if (isIOS) {
                window.location.replace(iosUrl);
            } else {
                window.location.replace(fallbackUrl);
            }
        })();
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 100px; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #009688; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Tamkeen Wallet</h2>
    <h3>محفظة تمكين</h3>
    <p>Redirecting to the App Store...</p>
    <p>جاري تحويلك إلى متجر التطبيقات...</p>
</body>
</html>
